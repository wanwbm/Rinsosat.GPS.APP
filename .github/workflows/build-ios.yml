name: Build iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS (No-Codesign)
        run: flutter build ios --release --no-codesign

      # Nota: Para gerar o .ipa assinado, são necessários certificados da Apple.
      # Este workflow compila o código para validar o build no iOS.
      # Para gerar o arquivo final para a App Store, você precisará configurar o Fastlane ou os certificados nos Secrets.
