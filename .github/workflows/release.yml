name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: Platforms to publish
        type: choice
        options: [both, android, ios]
        default: both

env:
  IOS_BUNDLE_ID: org.traccar.Rinosat GPSManager

jobs:
  build-android:
    if: ${{ github.event_name == 'push' || inputs.platform != 'ios' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare keystore + key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p "$RUNNER_WORKSPACE/environment"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_WORKSPACE/environment/android.keystore"
          cat > "$RUNNER_WORKSPACE/environment/key.properties" <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../../../environment/android.keystore
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 1

  smoke-test-android:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: .

      - name: Launch emulator and verify app starts
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r app-release.apk
            adb shell am start -W -n org.traccar.manager/org.traccar.manager.MainActivity
            sleep 10
            adb shell screencap -p /sdcard/launch.png
            adb pull /sdcard/launch.png launch.png
            adb shell pidof org.traccar.manager > /dev/null || { echo "App process not running after launch — crashed."; exit 1; }

      - uses: actions/upload-artifact@v5
        with:
          name: launch-screenshot
          path: launch.png
          if-no-files-found: error

  publish-android:
    needs: smoke-test-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: apk

      - name: Upload to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.traccar.manager
          releaseFiles: apk/app-release.apk
          track: production
          status: completed

  build-ios:
    if: ${{ github.event_name == 'push' || inputs.platform != 'android' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install flutterfire CLI
        run: dart pub global activate flutterfire_cli

      - name: Install codemagic-cli-tools
        run: pip3 install --break-system-packages codemagic-cli-tools

      - name: Initialize signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: keychain initialize --password "$KEYCHAIN_PASSWORD"

      - name: Decode App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: echo "$ASC_API_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"

      - name: Write distribution signing private key
        env:
          IOS_DIST_PRIVATE_KEY: ${{ secrets.IOS_DIST_PRIVATE_KEY }}
        run: printf '%s' "$IOS_DIST_PRIVATE_KEY" > "$RUNNER_TEMP/dist_private_key.pem"

      - name: Fetch signing files from App Store Connect
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key "@file:$RUNNER_TEMP/AuthKey.p8" \
            --certificate-key "@file:$RUNNER_TEMP/dist_private_key.pem" \
            --create

      - name: Install certificates into keychain
        run: keychain add-certificates

      - name: Apply profiles to Xcode project and generate ExportOptions.plist
        working-directory: ios
        run: xcode-project use-profiles --export-options-plist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive and export IPA
        run: |
          flutter pub get
          flutter build ios --release --no-codesign
          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/ipa"
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - uses: actions/upload-artifact@v5
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
          retention-days: 1

  publish-ios:
    needs: build-ios
    runs-on: macos-26
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ios-ipa
          path: ipa

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 -d > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls ipa/*.ipa | head -n 1)
          xcrun altool --upload-app -t ios -f "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

  release-github:
    needs: [publish-android, publish-ios]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk/app-release.apk
