name: rinosat_gps
description: "Rinosat GPS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  app_links: ^7.0.0
  firebase_analytics: ^12.4.1
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.4
  flutter_secure_storage: ^10.2.0
  http: ^1.6.0
  local_auth: ^3.0.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  rate_my_app: ^2.4.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  shared_preferences_android: ^2.4.23
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
